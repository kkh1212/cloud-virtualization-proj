apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: llm-ops
  labels:
    app: vllm
    app.kubernetes.io/name: vllm
    app.kubernetes.io/part-of: llm-ops-platform
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
        app.kubernetes.io/name: vllm
        app.kubernetes.io/part-of: llm-ops-platform
        gpu.vendor: amd
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      runtimeClassName: amd
      enableServiceLinks: false
      tolerations:
        - key: amd.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai-rocm:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - SYS_PTRACE
            seccompProfile:
              type: Unconfined
          args:
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --model
            - "$(MODEL_ID)"
            - --served-model-name
            - "$(SERVED_MODEL_NAME)"
            - --max-model-len
            - "$(MAX_MODEL_LEN)"
            - --max-num-seqs
            - "$(MAX_NUM_SEQS)"
            - --gpu-memory-utilization
            - "$(GPU_MEMORY_UTILIZATION)"
            - --dtype
            - "$(DTYPE)"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: GPU_VENDOR
              value: amd
            - name: MODEL_ID
              value: Qwen/Qwen2.5-0.5B-Instruct
            - name: SERVED_MODEL_NAME
              value: mock
            - name: MAX_MODEL_LEN
              value: "4096"
            - name: MAX_NUM_SEQS
              value: "256"
            - name: GPU_MEMORY_UTILIZATION
              value: "0.85"
            - name: DTYPE
              value: auto
            - name: HF_HOME
              value: /models
            - name: TRANSFORMERS_CACHE
              value: /models
            - name: VLLM_NO_USAGE_STATS
              value: "1"
            - name: VLLM_PORT
              value: "29500"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          resources:
            requests:
              cpu: "2"
              memory: 8Gi
            limits:
              cpu: "8"
              memory: 24Gi
              amd.com/gpu: "1"
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-model-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
