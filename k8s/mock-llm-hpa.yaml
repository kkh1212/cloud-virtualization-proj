# CPU-based HPA is intentional for Phase 7 / Rule #4 demonstration.
# Queue-based autoscaling is a future consideration; see docs/runbook.md.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mock-llm
  namespace: llm-ops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mock-llm
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
