# Service / workload suitability profiles.
#
# Four real-service workloads, each chosen to isolate a different LLM-serving
# bottleneck so the load test and the recommendation are meaningful:
#   support_chat   -> TTFT + queue (interactive concurrency)
#   doc_summary    -> prefill + GPU memory / KV cache (long input)
#   code_assistant -> decode / TPOT under longer code generation
#   json_extraction-> throughput / queue (high RPS, tiny output)
#
# This file IS consumed by the analyzer (analyzer/workload.py) and the session
# orchestrator (scripts/run-workload.sh via analyzer/workload_plan.py). For a chosen
# workload (--workload <name>) it drives:
#   - slo_profile : which analyzer/config/slo.yaml profile to auto-select
#   - thresholds  : per-metric pass/fail targets -> suitable / partially / unsuitable
#   - recommendations : bottleneck -> advisory playbook text (not computed numbers)
#   - initial_config  : Pipeline B (analyzer/provision.py) initial K8s/LLM defaults
#   - test_plan   : staged load LADDER (common baseline + target + monotonic stress + operational)
#
# threshold schema (keys are LOGICAL metric names from analyzer/config/metrics*.yaml):
#   <metric>: { max: X }  -> upper bound, lower is better
#   <metric>: { min: Y }  -> lower bound, higher is better
#   optional: agg in {peak(=series.max), mean, min}  (default: peak for max, mean for min)
#             weight (suitability-score weight, default 1)
# A metric absent from the snapshot is SKIPPED (not failed) — same gating as the
# rule engine, so GPU thresholds simply skip on the mock pipeline and activate
# automatically once vLLM/DCGM metrics are present.
#
# test_plan schema: phase groups + a load ladder.
#   common_baseline / target_baseline : single {scenario, env}
#   stress     : the LADDER — an ordered list of {scenario, env, load, role} rungs whose
#                `load` increases monotonically. The session aggregator walks these rungs
#                to find the capacity knee (last safe / first at-risk / break) per workload.
#   operational: list of {scenario, env, role} (realistic mixed/ramp/burst traffic)
#   load_unit  : unit of the rung `load` value (vus | rps | input_tokens) — for reporting.
#   levels.{quick,standard,full} : ordered list of the group keys to run.
#                quick=baselines only, standard=+full ladder (the capacity test), full=+operational.
# env keys map to each k6 scenario's __ENV.* knobs (e.g. RAG_CONTEXT_TOKENS, SHORT_VUS).
profiles:
  support_chat:
    description: "Customer-support RAG chatbot (Intercom Fin, Zendesk AI). Short user question plus retrieved support docs, answered interactively."
    request_shape: "short question + medium retrieved context, short/medium output, latency-sensitive"
    primary_scenarios: ["rag_like", "short_prompt", "mixed_workload"]
    watch_metrics: ["ttft_p95", "queue_wait_p95", "p95_latency", "requests_waiting"]
    bottleneck_focus: "TTFT + queue under concurrency"
    slo_profile: strict
    thresholds:
      ttft_p95:         { max: 1.0, agg: peak, weight: 2 }
      p95_latency:      { max: 3.0, agg: peak, weight: 2 }
      queue_wait_p95:   { max: 1.0, agg: peak, weight: 1 }
      requests_waiting: { max: 10,  agg: peak, weight: 1 }
    recommendations:
      queue:   ["minReplicas 상향", "KEDA queue 기반 autoscaling 적용", "short/RAG 전용 pool 분리"]
      prefill: ["RAG context 길이 제한(top_k 감소)", "중복 context 제거", "prefix caching 검토"]
      latency: ["max_tokens 제한", "더 작은/양자화 모델 검토"]
    initial_config:
      model_size_hint: small
      max_tokens: 512
      max_model_len: 8192
      replicas: { min: 2, max: 12 }
      autoscaler: keda_queue
      gpu_memory_utilization: 0.88
      request_timeout_seconds: 30
    test_plan:
      load_unit: vus
      common_baseline: { scenario: short_prompt, env: { SHORT_VUS: 4 } }
      target_baseline: { scenario: rag_like, env: { RAG_CONTEXT_TOKENS: 2000, RAG_VUS: 4 } }
      stress:
        - { scenario: rag_like, env: { RAG_CONTEXT_TOKENS: 2000, RAG_VUS: 8 },  load: 8,  role: conc_8 }
        - { scenario: rag_like, env: { RAG_CONTEXT_TOKENS: 2000, RAG_VUS: 16 }, load: 16, role: conc_16 }
        - { scenario: rag_like, env: { RAG_CONTEXT_TOKENS: 2000, RAG_VUS: 32 }, load: 32, role: conc_32 }
        - { scenario: rag_like, env: { RAG_CONTEXT_TOKENS: 2000, RAG_VUS: 64 }, load: 64, role: conc_64 }
      operational: [ { scenario: burst_traffic, env: {} } ]
      levels:
        quick:    [common_baseline, target_baseline]
        standard: [common_baseline, target_baseline, stress]
        full:     [common_baseline, target_baseline, stress, operational]

  doc_summary:
    description: "Document / meeting-notes / channel summarization (Slack AI, Notion AI, M365 Copilot). Long input read and condensed."
    request_shape: "long input, medium output, prefill-heavy"
    primary_scenarios: ["long_input", "sustained_ramp"]
    watch_metrics: ["ttft_p95", "prompt_tokens_p95", "gpu_memory_used_ratio", "kv_cache_ratio", "p99_latency"]
    bottleneck_focus: "prefill + GPU memory / KV cache as input length grows"
    slo_profile: long_context
    thresholds:
      ttft_p95:              { max: 3.0,   agg: peak, weight: 2 }
      p99_latency:           { max: 15.0,  agg: peak, weight: 1 }
      prompt_tokens_p95:     { max: 16000, agg: peak, weight: 1 }
      gpu_memory_used_ratio: { max: 0.90,  agg: peak, weight: 2 }   # vLLM/DCGM only; skipped on mock
      kv_cache_ratio:        { max: 0.90,  agg: peak, weight: 1 }
    recommendations:
      prefill:    ["문서 분할 요약(map-reduce)", "max input token 제한", "중복 context 제거"]
      gpu_memory: ["VRAM 큰 GPU 사용", "max_model_len 조정", "동시 요청 수 하향", "long_input 전용 pool 분리"]
      latency:    ["request_timeout 상향", "max_tokens 제한"]
    initial_config:
      model_size_hint: medium
      max_tokens: 512
      max_model_len: 32768
      replicas: { min: 1, max: 6 }
      autoscaler: hpa_cpu
      gpu_memory_utilization: 0.92
      request_timeout_seconds: 120
    test_plan:
      load_unit: input_tokens
      common_baseline: { scenario: short_prompt, env: { SHORT_VUS: 4 } }
      target_baseline: { scenario: long_input, env: { LONG_INPUT_TOKENS: 4000, LONG_INPUT_MAX_TOKENS: 400, LONG_INPUT_VUS: 2 } }
      stress:
        - { scenario: long_input, env: { LONG_INPUT_TOKENS: 4000,  LONG_INPUT_VUS: 2 }, load: 4000,  role: doc_4k }
        - { scenario: long_input, env: { LONG_INPUT_TOKENS: 8000,  LONG_INPUT_VUS: 2 }, load: 8000,  role: doc_8k }
        - { scenario: long_input, env: { LONG_INPUT_TOKENS: 16000, LONG_INPUT_VUS: 2 }, load: 16000, role: doc_16k }
        - { scenario: long_input, env: { LONG_INPUT_TOKENS: 32000, LONG_INPUT_VUS: 2 }, load: 32000, role: doc_32k }
      operational: [ { scenario: sustained_ramp, env: {} } ]
      levels:
        quick:    [common_baseline, target_baseline]
        standard: [common_baseline, target_baseline, stress]
        full:     [common_baseline, target_baseline, stress, operational]

  code_assistant:
    description: "Coding assistant (GitHub Copilot, Cursor). Code/context in, code/explanation out, used interactively in the IDE."
    request_shape: "fixed medium/long code context, increasingly long code output, decode-heavy"
    primary_scenarios: ["long_output", "long_input", "mixed_workload"]
    watch_metrics: ["ttft_p95", "tpot_p95", "p99_latency", "prompt_tokens_p95", "output_tokens_p95", "output_token_rate", "queue_wait_p95"]
    bottleneck_focus: "TPOT / p99 tail latency as output code length grows"
    slo_profile: long_context
    thresholds:
      ttft_p95:          { max: 2.0,  agg: peak, weight: 1 }
      tpot_p95:          { max: 0.06, agg: peak, weight: 2 }
      p99_latency:       { max: 20.0, agg: peak, weight: 2 }
      prompt_tokens_p95: { max: 8000, agg: peak, weight: 1 }
      output_token_rate: { min: 20,   agg: mean, weight: 1 }
    recommendations:
      prefill: ["select only relevant code context", "limit files/snippets per request", "deduplicate repeated repo context"]
      decode:  ["cap max_tokens for interactive code generation", "enable streaming responses", "split very long code generation into smaller steps"]
      latency: ["separate interactive completions from long generation requests", "isolate coding traffic in a dedicated serving pool", "review p99 long-tail requests separately"]
    initial_config:
      model_size_hint: medium
      max_tokens: 1536
      max_model_len: 16384
      replicas: { min: 2, max: 8 }
      autoscaler: keda_queue
      gpu_memory_utilization: 0.90
      request_timeout_seconds: 90
    test_plan:
      load_unit: output_tokens
      common_baseline: { scenario: short_prompt, env: { SHORT_VUS: 4 } }
      target_baseline: { scenario: long_output, env: { LONG_OUTPUT_INPUT_TOKENS: 4000, LONG_OUTPUT_MAX_TOKENS: 256, LONG_OUTPUT_VUS: 2 } }
      stress:
        - { scenario: long_output, env: { LONG_OUTPUT_INPUT_TOKENS: 4000, LONG_OUTPUT_MAX_TOKENS: 128,  LONG_OUTPUT_VUS: 2 }, load: 128,  role: output_128 }
        - { scenario: long_output, env: { LONG_OUTPUT_INPUT_TOKENS: 4000, LONG_OUTPUT_MAX_TOKENS: 256,  LONG_OUTPUT_VUS: 2 }, load: 256,  role: output_256 }
        - { scenario: long_output, env: { LONG_OUTPUT_INPUT_TOKENS: 4000, LONG_OUTPUT_MAX_TOKENS: 512,  LONG_OUTPUT_VUS: 2 }, load: 512,  role: output_512 }
        - { scenario: long_output, env: { LONG_OUTPUT_INPUT_TOKENS: 4000, LONG_OUTPUT_MAX_TOKENS: 1024, LONG_OUTPUT_VUS: 2 }, load: 1024, role: output_1024 }
      operational: [ { scenario: mixed_workload, env: {} } ]
      levels:
        quick:    [common_baseline, target_baseline]
        standard: [common_baseline, target_baseline, stress]
        full:     [common_baseline, target_baseline, stress, operational]

  json_extraction:
    description: "Structured extraction / classification / routing (CRM & email automation, ticket routing). Read input, emit a tiny JSON/label at high request rate."
    request_shape: "short/medium input, very short JSON output, high RPS, backend pipeline"
    primary_scenarios: ["json_extraction", "burst_traffic"]
    watch_metrics: ["p99_latency", "p95_latency", "queue_wait_p95", "requests_waiting", "error_rate"]
    bottleneck_focus: "throughput / queue / scheduling, p99 stability under high RPS"
    slo_profile: default
    thresholds:
      p99_latency:      { max: 5.0, agg: peak, weight: 2 }
      p95_latency:      { max: 3.0, agg: peak, weight: 1 }
      queue_wait_p95:   { max: 1.0, agg: peak, weight: 1 }
      requests_waiting: { max: 20,  agg: peak, weight: 1 }
    recommendations:
      queue:   ["replica 상향", "KEDA queue 기반 autoscaling 적용", "batch 처리/비동기 큐", "긴/짧은 요청 queue 분리"]
      latency: ["더 작은/classifier 모델 분리", "max_tokens 강하게 제한"]
    initial_config:
      model_size_hint: small
      max_tokens: 128
      max_model_len: 4096
      replicas: { min: 2, max: 12 }
      autoscaler: keda_queue
      gpu_memory_utilization: 0.85
      request_timeout_seconds: 30
    test_plan:
      load_unit: rps
      common_baseline: { scenario: short_prompt, env: { SHORT_VUS: 4 } }
      target_baseline: { scenario: json_extraction, env: { EXTRACT_RATE: 10 } }
      stress:
        - { scenario: json_extraction, env: { EXTRACT_RATE: 10 },  load: 10,  role: rps_10 }
        - { scenario: json_extraction, env: { EXTRACT_RATE: 25 },  load: 25,  role: rps_25 }
        - { scenario: json_extraction, env: { EXTRACT_RATE: 50 },  load: 50,  role: rps_50 }
        - { scenario: json_extraction, env: { EXTRACT_RATE: 100 }, load: 100, role: rps_100 }
      operational: [ { scenario: burst_traffic, env: {} } ]
      levels:
        quick:    [common_baseline, target_baseline]
        standard: [common_baseline, target_baseline, stress]
        full:     [common_baseline, target_baseline, stress, operational]
